<body>
<div id="root"><div id="boot"><div class="k">Loading demo</div><div>Model Card Studio を起動中… 初回はPython実行環境の読み込みに数十秒かかります。</div></div></div>
<script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";
mount({"requirements": ["scikit-learn", "altair", "numpy", "pandas"], "entrypoint": "app/streamlit_app.py", "files": {"app/streamlit_app.py": "\"\"\"Model Card Studio のエントリポイント。UI は薄く、計算は src/ に委譲する。\"\"\"\nfrom __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\nROOT = Path(__file__).resolve().parents[1]\nif str(ROOT) not in sys.path:\n    sys.path.insert(0, str(ROOT))\n\nimport altair as alt\nimport streamlit as st\n\n# stlite(Pyodide) の pyarrow モックには sklearn が isinstance 判定に使う\n# Table/RecordBatch 等が無く train_test_split が落ちる。属性を補完する。\n# 実 pyarrow がある環境では何もしない。\ntry:  # pragma: no cover\n    import pyarrow as _pa\n\n    for _name in (\"Table\", \"RecordBatch\", \"Array\", \"ChunkedArray\"):\n        if not hasattr(_pa, _name):\n            setattr(_pa, _name, type(_name, (), {}))\nexcept Exception:  # noqa: BLE001\n    pass\n\nfrom src.brand import (\n    apply_brand,\n    footer_backlink,\n    hero,\n    section,\n    sidebar_header,\n    themed_altair,\n)\nfrom src.data import available_datasets, load_dataset\nfrom src.limitations import generate_limitations\nfrom src.metrics import (\n    apply_threshold,\n    compute_calibration,\n    compute_metrics,\n    confusion_counts,\n    threshold_recall_swing,\n)\nfrom src.model import predict_proba_positive, train_model\nfrom src.plots import plot_calibration, plot_confusion_matrix\n\nDATASET_LABELS = {\n    \"breast_cancer\": \"Breast Cancer（sklearn・比較的バランス）\",\n    \"imbalanced_synthetic\": \"不均衡合成データ（95:5）\",\n}\n\n\n# stlite(Pyodide) は pyarrow がモックのため、シリアライズを伴う st.cache_data は使えない\n@st.cache_resource(show_spinner=False)\ndef train_pipeline(dataset_name: str, test_size: float, random_state: int) -> dict:\n    \"\"\"データ読込→学習→テスト予測確率までをキャッシュする。しきい値は含めない。\"\"\"\n    ds = load_dataset(dataset_name, test_size=test_size, random_state=random_state)\n    model = train_model(ds.X_train, ds.y_train, random_state=random_state)\n    y_prob = predict_proba_positive(model, ds.X_test)\n    return {\n        \"y_test\": ds.y_test,\n        \"y_prob\": y_prob,\n        \"pos_label\": ds.pos_label,\n        \"neg_label\": ds.neg_label,\n        \"feature_names\": ds.feature_names,\n        \"description\": ds.description,\n        \"source\": ds.source,\n        \"pos_count\": ds.pos_count,\n        \"neg_count\": ds.neg_count,\n        \"total_count\": ds.total_count,\n        \"n_train\": ds.X_train.shape[0],\n        \"n_test\": ds.X_test.shape[0],\n    }\n\n\ndef main() -> None:\n    st.set_page_config(\n        page_title=\"Model Card Studio\",\n        page_icon=\"📋\",\n        layout=\"centered\",\n    )\n    apply_brand(st)\n    themed_altair(alt)\n    hero(\n        st,\n        \"MODEL GOVERNANCE\",\n        \"Model Card Studio\",\n        \"分類モデルの評価を、精度以外も含めてモデルカード形式で表示し、較正・混同行列も可視化します。\",\n        chips=[\"Python\", \"scikit-learn\", \"Altair\", \"Model Card\"],\n    )\n\n    with st.sidebar:\n        sidebar_header(st, \"設定\")\n        dataset_name = st.selectbox(\n            \"データセット\",\n            options=list(available_datasets()),\n            format_func=lambda x: DATASET_LABELS.get(x, x),\n            index=0,\n        )\n        test_size = st.slider(\n            \"テストデータ割合\", min_value=0.2, max_value=0.5, value=0.3, step=0.05\n        )\n        random_state = st.number_input(\n            \"乱数シード\", min_value=0, max_value=9999, value=42, step=1\n        )\n        threshold = st.slider(\n            \"判定しきい値（陽性確率）\", min_value=0.0, max_value=1.0, value=0.5, step=0.01\n        )\n        st.divider()\n        if st.button(\"再学習（キャッシュクリア）\", width=\"stretch\"):\n            st.cache_resource.clear()\n            st.session_state[\"last_retrain\"] = True\n            st.rerun()\n        if st.session_state.get(\"last_retrain\"):\n            st.caption(\"キャッシュをクリアして再学習しました。\")\n\n    try:\n        bundle = train_pipeline(dataset_name, test_size, int(random_state))\n    except Exception as exc:  # noqa: BLE001\n        st.error(f\"学習に失敗しました: {exc}\")\n        return\n\n    if bundle[\"n_test\"] == 0:\n        st.warning(\"テストデータが空です。テストデータ割合を上げてください。\")\n        return\n\n    y_test = bundle[\"y_test\"]\n    y_prob = bundle[\"y_prob\"]\n    y_pred = apply_threshold(y_prob, threshold)\n    metrics = compute_metrics(y_test, y_pred)\n    confusion = confusion_counts(y_test, y_pred)\n    calibration = compute_calibration(y_test, y_prob, n_bins=10)\n    recall_swing = threshold_recall_swing(y_test, y_prob, threshold)\n    limitations = generate_limitations(\n        metrics,\n        confusion,\n        calibration,\n        bundle,\n        threshold,\n        recall_swing,\n    )\n\n    tab_summary, tab_metrics, tab_cm, tab_cal, tab_lim = st.tabs(\n        [\"データセット概要\", \"評価指標\", \"混同行列\", \"較正\", \"制限事項\"]\n    )\n\n    with tab_summary:\n        section(st, \"DATASET\", \"データセット概要\")\n        st.write(bundle[\"description\"])\n        c1, c2, c3 = st.columns(3)\n        c1.metric(\"総サンプル数\", bundle[\"total_count\"])\n        c2.metric(\"学習 / テスト\", f\"{bundle['n_train']} / {bundle['n_test']}\")\n        c3.metric(\"特徴量数\", len(bundle[\"feature_names\"]))\n        c1, c2 = st.columns(2)\n        c1.metric(bundle[\"pos_label\"], bundle[\"pos_count\"])\n        c2.metric(bundle[\"neg_label\"], bundle[\"neg_count\"])\n        ratio = (\n            max(bundle[\"pos_count\"], bundle[\"neg_count\"])\n            / max(1, min(bundle[\"pos_count\"], bundle[\"neg_count\"]))\n        )\n        st.info(f\"クラス比（多数:少数）= {ratio:.1f}:1\")\n        st.caption(f\"データ出所: {bundle['source']}\")\n\n    with tab_metrics:\n        section(st, \"METRICS\", \"評価指標\")\n        st.caption(f\"しきい値 = {threshold:.2f} のとき\")\n        c1, c2, c3, c4 = st.columns(4)\n        c1.metric(\"正解率\", f\"{metrics['accuracy']:.3f}\")\n        c2.metric(\"適合率\", f\"{metrics['precision']:.3f}\")\n        c3.metric(\"再現率\", f\"{metrics['recall']:.3f}\")\n        c4.metric(\"F1\", f\"{metrics['f1']:.3f}\")\n        c1, c2 = st.columns(2)\n        c1.metric(\"評価サンプル数\", metrics[\"support\"])\n        c2.metric(\"しきい値±0.1 の再現率変動\", f\"{recall_swing:.3f}\")\n        if abs(metrics[\"accuracy\"] - metrics[\"recall\"]) >= 0.1:\n            st.warning(\n                f\"正解率 {metrics['accuracy']:.2f} と再現率 {metrics['recall']:.2f} に差がある。\"\n                \"精度だけではモデルを評価できない例。\"\n            )\n\n    with tab_cm:\n        section(st, \"CONFUSION MATRIX\", \"混同行列\")\n        chart = plot_confusion_matrix(confusion, bundle[\"pos_label\"], bundle[\"neg_label\"])\n        st.altair_chart(chart, width=\"stretch\")\n        st.caption(\n            f\"TP={confusion['tp']} / FP={confusion['fp']} / \"\n            f\"TN={confusion['tn']} / FN={confusion['fn']}\"\n        )\n\n    with tab_cal:\n        section(st, \"CALIBRATION\", \"較正\")\n        c1, c2 = st.columns(2)\n        c1.metric(\"Brierスコア\", f\"{calibration['brier']:.3f}\")\n        c2.metric(\"ECE\", f\"{calibration['ece']:.3f}\")\n        chart = plot_calibration(calibration)\n        st.altair_chart(chart, width=\"stretch\")\n        st.caption(\"点の大きさは bin 内サンプル数に概ね比例。対角線に近いほど較正が良い。\")\n\n    with tab_lim:\n        section(st, \"LIMITATIONS\", \"制限事項（自動生成）\")\n        st.markdown(\n            \"**精度だけではモデルを評価できない。** 以下は指標とデータ特性から自動抽出した注意点。\"\n        )\n        for i, item in enumerate(limitations, 1):\n            st.markdown(f\"{i}. {item}\")\n\n    footer_backlink(st, repo=\"model-card-studio\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "src/__init__.py": "", "src/brand.py": "\"\"\"Portfolio Design System v2 \"Ink & Signal\" — Streamlit 共通ブランドテーマ。\n\nportfolio-hub と12デモで視覚言語を揃える単一ファイル。外部依存なし。\n正典: portfolio-plan/brand/brand.py（各リポの src/brand.py へそのままコピーする）\n仕様: portfolio-plan/design-system.md\n\n各アプリの ``streamlit_app.py`` から::\n\n    from src.brand import apply_brand, hero, section, sidebar_header, footer_backlink\n    apply_brand(st)                      # set_page_config の後に一度だけ\n    hero(st, \"KICKER\", \"タイトル\", \"サブ説明\", chips=[\"python\", \"altair\"])\n    ...\n    footer_backlink(st, repo=\"rag-eval-dashboard\")\n\nAltair を使うアプリは import 直後に::\n\n    import altair as alt\n    from src.brand import themed_altair\n    themed_altair(alt)\n\nPlotly を使うアプリは figure ごとに::\n\n    fig.update_layout(**plotly_template())\n\"\"\"\n\nfrom __future__ import annotations\n\nPALETTE = [\"#0f766e\", \"#2563eb\", \"#d97706\", \"#be185d\", \"#7c3aed\", \"#64748b\"]\n\n_FONT_BODY = \"'Inter', 'Noto Sans JP', system-ui, sans-serif\"\n_FONT_DISPLAY = \"'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif\"\n_FONT_MONO = \"'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace\"\n\n_BRAND_CSS = \"\"\"\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');\n/* stlite は Material Symbols を同梱しないため明示ロード（expander 矢印等の豆腐化防止） */\n@import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block');\n\n:root {\n  --bg:#f6f7f9; --fg:#0d1526; --muted:#5b6474;\n  --surface:#ffffff;\n  --line:rgba(13,21,38,0.10); --line-strong:rgba(13,21,38,0.20);\n  --accent:#0f766e; --accent-strong:#115e59; --link:#2563eb; --dark:#0b1220;\n  --shadow:0 1px 2px rgba(13,21,38,.05), 0 8px 24px rgba(13,21,38,.06);\n  --shadow-hover:0 2px 4px rgba(13,21,38,.06), 0 16px 40px rgba(13,21,38,.10);\n}\n\n/* typography（アイコンフォントは触らない） */\nhtml, body, .stApp, .stMarkdown, p, li,\nspan:not([data-testid=\"stIconMaterial\"]):not([class*=\"material-symbols\"]),\nlabel, button, input, textarea, select,\n[data-testid=\"stWidgetLabel\"], [data-testid=\"stMetricLabel\"] {\n  font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif;\n}\n/* Material Symbols のリガチャを死守（expander 矢印等） */\n[data-testid=\"stIconMaterial\"], [class*=\"material-symbols\"] {\n  font-family: 'Material Symbols Rounded' !important;\n}\nh1, h2, h3, h4 {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n}\ncode, pre, kbd,\n[data-testid=\"stMetricValue\"], [data-testid=\"stMetricDelta\"] {\n  font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;\n  font-variant-numeric: tabular-nums;\n}\n\n/* 背景：ほぼ無地＋上部にごく薄い teal の気配 */\n.stApp {\n  background:\n    radial-gradient(1200px 480px at 50% -160px, rgba(15,118,110,0.07), transparent 70%),\n    #f6f7f9;\n  color: var(--fg);\n}\n\n/* Streamlit クロームを控えめに */\nheader[data-testid=\"stHeader\"] { background: transparent; }\n[data-testid=\"stToolbar\"], #MainMenu, footer { visibility: hidden; height: 0; }\n[data-testid=\"stDecoration\"] { display: none; }\n\n/* 本文幅と余白 */\n.block-container, [data-testid=\"stMainBlockContainer\"] {\n  max-width: 1180px; padding-top: 2.4rem; padding-bottom: 3rem;\n}\n\n/* 見出し */\nh1 { font-weight: 700 !important; letter-spacing: -0.03em; line-height: 1.08; color: var(--fg); }\nh2 { font-weight: 700 !important; letter-spacing: -0.02em; color: var(--fg); }\nh3 { font-weight: 700 !important; letter-spacing: -0.01em; color: var(--fg); }\n\n/* Hero ブロック */\n.brand-hero { margin: 4px 0 34px; }\n.brand-kicker {\n  color: var(--accent); font-size: .75rem; font-weight: 700;\n  letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;\n}\n.brand-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: clamp(2.1rem, 4.5vw, 3.2rem); font-weight: 700;\n  line-height: 1.08; letter-spacing: -0.03em; color: var(--fg); margin: 0;\n}\n.brand-sub {\n  color: var(--muted); font-size: 1rem; line-height: 1.8;\n  margin-top: 14px; max-width: 760px;\n}\n.brand-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }\n.brand-chip {\n  border: 1px solid var(--line); border-radius: 999px; background: var(--surface);\n  padding: 4px 12px; color: var(--muted); font-size: .78rem; font-weight: 600;\n  font-family: 'IBM Plex Mono', ui-monospace, monospace;\n}\n\n/* セクション見出し */\n.brand-section { margin: 34px 0 6px; }\n.brand-section .brand-kicker { margin-bottom: 6px; }\n.brand-section-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: 1.45rem; font-weight: 700; letter-spacing: -0.02em;\n  color: var(--fg); margin: 0;\n}\n\n/* サイドバー：不透明サーフェス */\n[data-testid=\"stSidebar\"] {\n  background: #fbfcfd;\n  border-right: 1px solid var(--line);\n}\n.brand-side-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em;\n  color: var(--fg); margin: 2px 0 2px;\n}\n\n/* metric をカード化（左に accent の芯） */\n[data-testid=\"stMetric\"] {\n  background: var(--surface);\n  border: 1px solid var(--line); border-left: 3px solid var(--accent);\n  border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow);\n}\n[data-testid=\"stMetricValue\"] { color: var(--fg); font-weight: 600; }\n[data-testid=\"stMetricLabel\"] {\n  color: var(--muted); font-size: .74rem; font-weight: 600;\n  letter-spacing: .08em; text-transform: uppercase;\n}\n\n/* ボタン */\n.stButton > button, .stDownloadButton > button, .stFormSubmitButton > button {\n  border-radius: 10px; border: 1px solid var(--fg); background: var(--fg);\n  color: #fff; font-weight: 600; padding: 8px 18px;\n  transition: transform .15s ease, background .15s ease, box-shadow .15s ease;\n}\n.stButton > button:hover, .stDownloadButton > button:hover,\n.stFormSubmitButton > button:hover {\n  background: var(--dark); border-color: var(--dark); color: #fff;\n  transform: translateY(-1px); box-shadow: var(--shadow);\n}\n\n/* タブ */\n.stTabs [data-baseweb=\"tab-list\"] { gap: 4px; border-bottom: 1px solid var(--line); }\n.stTabs [data-baseweb=\"tab\"] { font-weight: 600; color: var(--muted); }\n.stTabs [aria-selected=\"true\"] { color: var(--accent-strong); }\n\n/* 表・expander をカード化 */\n[data-testid=\"stDataFrame\"], [data-testid=\"stTable\"] {\n  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;\n  box-shadow: var(--shadow); background: var(--surface);\n}\n[data-testid=\"stExpander\"] {\n  border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n\n/* 入力の角丸 */\n[data-baseweb=\"select\"] > div, .stTextInput input, .stTextArea textarea,\n.stNumberInput input { border-radius: 10px !important; }\n\n/* 通知・区切り・リンク */\n[data-testid=\"stNotification\"], .stAlert { border-radius: 10px; }\nhr { border-color: var(--line); }\na { color: var(--link); }\n\n/* 静的テーブル（st.dataframe の stlite 代替） */\n.brand-table-wrap {\n  overflow-x: auto; border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n.brand-table { width: 100%; border-collapse: collapse; font-size: .88rem; }\n.brand-table th {\n  text-align: left; color: var(--muted); font-size: .72rem; font-weight: 600;\n  letter-spacing: .06em; text-transform: uppercase;\n  padding: 10px 14px; border-bottom: 1px solid var(--line-strong); background: #fbfcfd;\n}\n.brand-table td {\n  padding: 9px 14px; border-bottom: 1px solid var(--line);\n  color: var(--fg); font-variant-numeric: tabular-nums;\n}\n.brand-table tr:last-child td { border-bottom: none; }\n\n/* フッター */\n.brand-footer {\n  margin-top: 48px; padding-top: 18px; border-top: 1px solid var(--line);\n  display: flex; flex-wrap: wrap; gap: 8px 20px;\n  align-items: center; justify-content: space-between;\n  color: var(--muted); font-size: .82rem; line-height: 1.7;\n}\n.brand-footer a { color: var(--accent-strong); font-weight: 600; text-decoration: none; }\n.brand-footer a:hover { text-decoration: underline; }\n</style>\n\"\"\"\n\nHUB_URL = \"https://oishizawads.github.io/portfolio-hub/\"\nGITHUB_OWNER = \"oishizawads\"\n\n\ndef apply_brand(st) -> None:\n    \"\"\"ブランド CSS を注入する。``st.set_page_config`` の後に一度だけ呼ぶ。\"\"\"\n    st.markdown(_BRAND_CSS, unsafe_allow_html=True)\n\n\ndef _esc(text: str) -> str:\n    return (\n        str(text)\n        .replace(\"&\", \"&amp;\")\n        .replace(\"<\", \"&lt;\")\n        .replace(\">\", \"&gt;\")\n    )\n\n\ndef hero(\n    st,\n    kicker: str,\n    title: str,\n    subtitle: str | None = None,\n    chips: list[str] | None = None,\n) -> None:\n    \"\"\"ヒーロー見出し（キッカー + 大見出し + サブ説明 + 技術チップ）。\"\"\"\n    html = (\n        '<div class=\"brand-hero\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-title\">{_esc(title)}</div>'\n    )\n    if subtitle:\n        html += f'<div class=\"brand-sub\">{_esc(subtitle)}</div>'\n    if chips:\n        html += '<div class=\"brand-chips\">'\n        html += \"\".join(f'<span class=\"brand-chip\">{_esc(c)}</span>' for c in chips)\n        html += \"</div>\"\n    html += \"</div>\"\n    st.markdown(html, unsafe_allow_html=True)\n\n\ndef section(st, kicker: str, title: str) -> None:\n    \"\"\"本文セクション見出し（kicker + タイトル）。``st.header`` の代替。\"\"\"\n    st.markdown(\n        '<div class=\"brand-section\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-section-title\">{_esc(title)}</div>'\n        \"</div>\",\n        unsafe_allow_html=True,\n    )\n\n\ndef sidebar_header(st, title: str, caption: str | None = None) -> None:\n    \"\"\"サイドバー先頭の見出し。\"\"\"\n    html = (\n        '<div class=\"brand-kicker\" style=\"margin-top:4px\">Controls</div>'\n        f'<div class=\"brand-side-title\">{_esc(title)}</div>'\n    )\n    st.sidebar.markdown(html, unsafe_allow_html=True)\n    if caption:\n        st.sidebar.caption(caption)\n\n\ndef footer_backlink(st, repo: str | None = None) -> None:\n    \"\"\"合成データ注記と Portfolio Hub への戻りリンクを持つ共通フッター。\"\"\"\n    links = f'<a href=\"{HUB_URL}\">← Portfolio Hub</a>'\n    if repo:\n        links += (\n            f' &nbsp; <a href=\"https://github.com/{GITHUB_OWNER}/{_esc(repo)}\">'\n            \"GitHub ↗</a>\"\n        )\n    st.markdown(\n        '<div class=\"brand-footer\">'\n        \"<span>Synthetic data demo — 数値はすべて合成データで、実在の精度・効果を示しません。</span>\"\n        f\"<span>{links}</span>\"\n        \"</div>\",\n        unsafe_allow_html=True,\n    )\n\n\ndef show_table(st, df, hide_index: bool = True, float_fmt: str | None = None) -> None:\n    \"\"\"静的 HTML テーブルとして描画する。\n\n    stlite 1.8 系では st.dataframe（glide-data-grid）が空描画になるため、\n    デモの一覧表示はこのヘルパーで代替する。\n    \"\"\"\n    data = df.copy()\n    if float_fmt:\n        for col in data.columns:\n            if getattr(data[col].dtype, \"kind\", \"\") == \"f\":\n                data[col] = data[col].map(lambda v: float_fmt.format(v))\n    html = data.to_html(index=not hide_index, classes=\"brand-table\", border=0)\n    st.markdown(f'<div class=\"brand-table-wrap\">{html}</div>', unsafe_allow_html=True)\n\n\ndef altair_config() -> dict:\n    \"\"\"ブランド仕様の Altair テーマ設定を返す。\"\"\"\n    return {\n        \"config\": {\n            \"background\": \"transparent\",\n            \"font\": _FONT_BODY,\n            \"range\": {\"category\": PALETTE},\n            \"axis\": {\n                \"labelFont\": _FONT_BODY,\n                \"titleFont\": _FONT_BODY,\n                \"labelColor\": \"#5b6474\",\n                \"titleColor\": \"#0d1526\",\n                \"titleFontWeight\": 600,\n                \"labelFontSize\": 12,\n                \"titleFontSize\": 12,\n                \"gridColor\": \"rgba(13,21,38,0.08)\",\n                \"domainColor\": \"rgba(13,21,38,0.20)\",\n                \"tickColor\": \"rgba(13,21,38,0.20)\",\n            },\n            \"legend\": {\n                \"labelFont\": _FONT_BODY,\n                \"titleFont\": _FONT_BODY,\n                \"labelColor\": \"#5b6474\",\n                \"titleColor\": \"#0d1526\",\n            },\n            \"title\": {\n                \"font\": _FONT_DISPLAY,\n                \"color\": \"#0d1526\",\n                \"fontSize\": 15,\n                \"fontWeight\": 700,\n                \"anchor\": \"start\",\n            },\n            \"view\": {\"stroke\": \"transparent\"},\n            \"bar\": {\"color\": PALETTE[0]},\n            \"line\": {\"color\": PALETTE[0], \"strokeWidth\": 2.5},\n            \"point\": {\"color\": PALETTE[0], \"filled\": True, \"size\": 70},\n            \"area\": {\"color\": PALETTE[0], \"opacity\": 0.16, \"line\": True},\n            \"rule\": {\"color\": \"#5b6474\"},\n        }\n    }\n\n\ndef themed_altair(alt) -> None:\n    \"\"\"Altair にブランドテーマを登録して有効化する（バージョン差異を吸収）。\"\"\"\n    theme = altair_config\n\n    try:  # altair >= 5.5\n        alt.theme.register(\"brand\", enable=True)(theme)\n        return\n    except Exception:\n        pass\n    try:  # altair < 5.5\n        alt.themes.register(\"brand\", theme)\n        alt.themes.enable(\"brand\")\n    except Exception:\n        pass\n\n\ndef set_plotly_theme() -> None:\n    \"\"\"plotly express が色を焼き込む前にブランドテンプレートを既定化する。\n\n    figure 生成より前（import 直後）に一度だけ呼ぶ。\n    \"\"\"\n    import plotly.graph_objects as go\n    import plotly.io as pio\n\n    pio.templates[\"brand\"] = go.layout.Template(layout=plotly_template())\n    pio.templates.default = \"plotly_white+brand\"\n\n\ndef plotly_template() -> dict:\n    \"\"\"``fig.update_layout(**plotly_template())`` で適用する共通レイアウト。\"\"\"\n    grid = \"rgba(13,21,38,0.08)\"\n    zero = \"rgba(13,21,38,0.20)\"\n    return {\n        \"font\": {\"family\": \"Inter, Noto Sans JP, sans-serif\", \"color\": \"#0d1526\", \"size\": 13},\n        \"paper_bgcolor\": \"rgba(0,0,0,0)\",\n        \"plot_bgcolor\": \"rgba(0,0,0,0)\",\n        \"colorway\": PALETTE,\n        \"xaxis\": {\"gridcolor\": grid, \"zerolinecolor\": zero, \"linecolor\": zero},\n        \"yaxis\": {\"gridcolor\": grid, \"zerolinecolor\": zero, \"linecolor\": zero},\n        \"legend\": {\"bgcolor\": \"rgba(0,0,0,0)\"},\n        \"margin\": {\"t\": 48, \"r\": 16, \"b\": 48, \"l\": 56},\n        \"hoverlabel\": {\"font\": {\"family\": \"Inter, Noto Sans JP, sans-serif\"}},\n    }\n", "src/data.py": "\"\"\"データセット読み込み。sklearn サンプル / 合成データのみを使用する。\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nimport numpy as np\nfrom sklearn import datasets\nfrom sklearn.model_selection import train_test_split\n\n\n@dataclass\nclass Dataset:\n    \"\"\"学習/評価に使うデータとメタ情報。\"\"\"\n\n    X_train: np.ndarray\n    X_test: np.ndarray\n    y_train: np.ndarray\n    y_test: np.ndarray\n    feature_names: list[str]\n    pos_label: str\n    neg_label: str\n    description: str\n    source: str\n\n    @property\n    def pos_count(self) -> int:\n        return int(np.sum(self.y_train == 1) + np.sum(self.y_test == 1))\n\n    @property\n    def neg_count(self) -> int:\n        return int(np.sum(self.y_train == 0) + np.sum(self.y_test == 0))\n\n    @property\n    def total_count(self) -> int:\n        return int(self.X_train.shape[0] + self.X_test.shape[0])\n\n\n_DATASET_NAMES = (\"breast_cancer\", \"imbalanced_synthetic\")\n\n\ndef available_datasets() -> tuple[str, ...]:\n    return _DATASET_NAMES\n\n\ndef _load_breast_cancer(test_size: float, random_state: int) -> Dataset:\n    bunch = datasets.load_breast_cancer()\n    X = np.asarray(bunch.data, dtype=float)\n    y = np.asarray(bunch.target, dtype=int)\n    # sklearn の定義: 0=malignant(悪性), 1=benign(良性)。陽性を benign とする。\n    return Dataset(\n        *_split(X, y, test_size, random_state),\n        feature_names=list(bunch.feature_names),\n        pos_label=\"benign(良性)\",\n        neg_label=\"malignant(悪性)\",\n        description=\"sklearn の Breast Cancer Wisconsin データセット。細胞核の形状特徴量から悪性/良性を分類する。\",\n        source=\"sklearn.datasets.load_breast_cancer\",\n    )\n\n\ndef _load_imbalanced_synthetic(test_size: float, random_state: int) -> Dataset:\n    X, y = datasets.make_classification(\n        n_samples=1000,\n        n_features=8,\n        n_informative=5,\n        n_redundant=2,\n        n_repeated=0,\n        n_clusters_per_class=2,\n        weights=[0.95, 0.05],\n        flip_y=0.02,\n        class_sep=0.9,\n        random_state=random_state,\n    )\n    y = np.asarray(y, dtype=int)\n    return Dataset(\n        *_split(X, y, test_size, random_state),\n        feature_names=[f\"feature_{i}\" for i in range(X.shape[1])],\n        pos_label=\"陽性(少数派)\",\n        neg_label=\"陰性(多数派)\",\n        description=\"sklearn make_classification による合成データ。意図的に 95:5 のクラス不均衡を与えている。\",\n        source=\"sklearn.datasets.make_classification (weights=[0.95, 0.05])\",\n    )\n\n\ndef _split(X: np.ndarray, y: np.ndarray, test_size: float, random_state: int):\n    if not 0.0 < test_size < 1.0:\n        raise ValueError(f\"test_size は 0<test_size<1 の範囲で指定してください（指定値: {test_size}）\")\n    Xtr, Xte, ytr, yte = train_test_split(\n        X, y, test_size=test_size, random_state=random_state, stratify=y\n    )\n    return Xtr, Xte, ytr, yte\n\n\ndef load_dataset(name: str, test_size: float = 0.3, random_state: int = 42) -> Dataset:\n    \"\"\"名前指定でデータセットを読み込む。未知の名前は ValueError。\"\"\"\n    if name not in _DATASET_NAMES:\n        raise ValueError(\n            f\"未知のデータセット名: {name!r}。利用可能: {', '.join(_DATASET_NAMES)}\"\n        )\n    if name == \"breast_cancer\":\n        return _load_breast_cancer(test_size, random_state)\n    return _load_imbalanced_synthetic(test_size, random_state)\n", "src/limitations.py": "\"\"\"制限事項の自動文章化。指標とデータ特性から根拠付きの注意点を生成する。\"\"\"\nfrom __future__ import annotations\n\nfrom typing import Any\n\n\ndef generate_limitations(\n    metrics: dict[str, Any],\n    confusion: dict[str, int],\n    calibration: dict[str, Any],\n    dataset_info: dict[str, Any],\n    threshold: float,\n    recall_swing: float,\n) -> list[str]:\n    \"\"\"評価結果から制限事項を自動生成する。常に末尾に汎用的な注意を2件追加する。\"\"\"\n    items: list[str] = []\n    pos = int(dataset_info.get(\"pos_count\", 0))\n    neg = int(dataset_info.get(\"neg_count\", 0))\n    minority = max(1, min(pos, neg))\n    ratio = max(pos, neg) / minority\n    if ratio >= 4.0:\n        items.append(\n            f\"クラス不均衡が大きい（陽性:陰性 = {pos}:{neg}、比 {ratio:.1f}:1）。\"\n            \"全体の正解率が高く見えても少数クラスの再現率は低くなりやすく、少数クラス単独で評価すること。\"\n        )\n    recall = float(metrics.get(\"recall\", 0.0))\n    precision = float(metrics.get(\"precision\", 0.0))\n    if recall < 0.7:\n        items.append(\n            f\"再現率（Recall）が {recall:.2f} と低く、陽性の取りこぼしが多い。\"\n            \"しきい値を下げるか、クラス重み付け / 再サンプリングを検討すること。\"\n        )\n    if precision < 0.7:\n        items.append(\n            f\"適合率（Precision）が {precision:.2f} と低く、誤報が多い。\"\n            \"しきい値を上げて陽性判定を厳しくすることを検討すること。\"\n        )\n    if abs(recall - precision) >= 0.2:\n        items.append(\n            f\"再現率 {recall:.2f} と適合率 {precision:.2f} に大きく差がある。\"\n            \"正解率だけではこの乖離が見えないため、用途に応じた指標を選ぶこと。\"\n        )\n    brier = float(calibration.get(\"brier\", 0.0))\n    ece = float(calibration.get(\"ece\", 0.0))\n    if brier > 0.2:\n        items.append(\n            f\"Brierスコア {brier:.3f} が高く、予測確率の較正が悪い。\"\n            \"Platt scaling / isotonic 回帰による較正を検討すること。\"\n        )\n    if ece > 0.1:\n        items.append(\n            f\"期待較正誤差（ECE）{ece:.3f} が大きく、予測確率と実測頻度にずれがある。\"\n            \"確率をそのまま意思決定に使わないこと。\"\n        )\n    if recall_swing > 0.15:\n        items.append(\n            f\"しきい値 ±0.1 で再現率が {recall_swing:.2f} 変動する。\"\n            \"運用時のしきい値選定が結果に強く影響するため、根拠を明示して固定すること。\"\n        )\n    support = int(metrics.get(\"support\", 0))\n    if support < 200:\n        items.append(\n            f\"評価サンプル数が {support} と少なく、指標のばらつきが大きい。\"\n            \"追加データで再評価すること。\"\n        )\n    # 汎用注意（常に表示）\n    items.append(\n        \"本モデルは学習データの分布のみで評価しており、運用環境での分布シフト・ドリフトには未対応。\"\n        \"本番投入前に定期評価と人間のレビューを設けること。\"\n    )\n    items.append(\n        f\"データは {dataset_info.get('source', 'サンプル/合成データ')} であり、\"\n        \"実運用の母集団を代表しない。実データでの再検証が必須。\"\n    )\n    return items\n", "src/metrics.py": "\"\"\"評価指標・混同行列・較正の計算。UI に依存しない純粋関数。\"\"\"\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef apply_threshold(y_prob: np.ndarray, threshold: float) -> np.ndarray:\n    \"\"\"予測確率をしきい値で二値ラベルに変換する。\"\"\"\n    y_prob = np.asarray(y_prob, dtype=float)\n    if not np.all(np.isfinite(y_prob)):\n        raise ValueError(\"予測確率に非有限値が含まれます\")\n    if np.any((y_prob < 0.0) | (y_prob > 1.0)):\n        raise ValueError(\"予測確率は 0〜1 の範囲である必要があります\")\n    if not (0.0 <= threshold <= 1.0):\n        raise ValueError(f\"しきい値は 0〜1 の範囲で指定してください（指定値: {threshold}）\")\n    if y_prob.size == 0:\n        return np.array([], dtype=int)\n    return (y_prob >= threshold).astype(int)\n\n\ndef confusion_counts(y_true: np.ndarray, y_pred: np.ndarray) -> dict[str, int]:\n    \"\"\"混同行列の各成分を返す。空入力は全 0。\"\"\"\n    y_true = np.asarray(y_true, dtype=int)\n    y_pred = np.asarray(y_pred, dtype=int)\n    if y_true.size == 0:\n        return {\"tp\": 0, \"fp\": 0, \"tn\": 0, \"fn\": 0}\n    tp = int(np.sum((y_pred == 1) & (y_true == 1)))\n    fp = int(np.sum((y_pred == 1) & (y_true == 0)))\n    tn = int(np.sum((y_pred == 0) & (y_true == 0)))\n    fn = int(np.sum((y_pred == 0) & (y_true == 1)))\n    return {\"tp\": tp, \"fp\": fp, \"tn\": tn, \"fn\": fn}\n\n\ndef compute_metrics(y_true: np.ndarray, y_pred: np.ndarray) -> dict[str, float]:\n    \"\"\"accuracy / precision / recall / f1 / support を返す。分母 0 は 0.0 に潰す。\"\"\"\n    cm = confusion_counts(y_true, y_pred)\n    tp, fp, tn, fn = cm[\"tp\"], cm[\"fp\"], cm[\"tn\"], cm[\"fn\"]\n    support = tp + fp + tn + fn\n    if support == 0:\n        return {\"accuracy\": 0.0, \"precision\": 0.0, \"recall\": 0.0, \"f1\": 0.0, \"support\": 0}\n    accuracy = (tp + tn) / support\n    precision = tp / (tp + fp) if (tp + fp) > 0 else 0.0\n    recall = tp / (tp + fn) if (tp + fn) > 0 else 0.0\n    f1 = (2 * precision * recall / (precision + recall)) if (precision + recall) > 0 else 0.0\n    return {\n        \"accuracy\": float(accuracy),\n        \"precision\": float(precision),\n        \"recall\": float(recall),\n        \"f1\": float(f1),\n        \"support\": int(support),\n    }\n\n\ndef brier_score(y_true: np.ndarray, y_prob: np.ndarray) -> float:\n    \"\"\"Brierスコア（低いほど較正が良い）。\"\"\"\n    y_true = np.asarray(y_true, dtype=float)\n    y_prob = np.asarray(y_prob, dtype=float)\n    if y_true.size == 0:\n        return 0.0\n    if y_true.shape != y_prob.shape:\n        raise ValueError(\"y_true と y_prob の形状が一致しません\")\n    return float(np.mean((y_prob - y_true) ** 2))\n\n\ndef _bin_indices(y_prob: np.ndarray, n_bins: int) -> tuple[np.ndarray, np.ndarray]:\n    if n_bins < 1:\n        raise ValueError(f\"n_bins は 1 以上で指定してください（指定値: {n_bins}）\")\n    edges = np.linspace(0.0, 1.0, n_bins + 1)\n    # 境界値の扱い: 各 bin は [left, right)。最後の bin だけ [left, right]。\n    idx = np.digitize(y_prob, edges[1:-1])\n    idx = np.clip(idx, 0, n_bins - 1)\n    return idx, edges\n\n\ndef expected_calibration_error(\n    y_true: np.ndarray, y_prob: np.ndarray, n_bins: int = 10\n) -> float:\n    \"\"\"ECE（期待較正誤差）。各 bin の (信頼度 - 実測頻度) を重み付き平均。\"\"\"\n    y_true = np.asarray(y_true, dtype=float)\n    y_prob = np.asarray(y_prob, dtype=float)\n    if y_true.size == 0:\n        return 0.0\n    if y_true.shape != y_prob.shape:\n        raise ValueError(\"y_true と y_prob の形状が一致しません\")\n    idx, _ = _bin_indices(y_prob, n_bins)\n    n = y_true.size\n    ece = 0.0\n    for b in range(n_bins):\n        mask = idx == b\n        count = int(np.sum(mask))\n        if count == 0:\n            continue\n        conf = float(np.mean(y_prob[mask]))\n        emp = float(np.mean(y_true[mask]))\n        ece += (count / n) * abs(conf - emp)\n    return float(ece)\n\n\ndef compute_calibration(\n    y_true: np.ndarray, y_prob: np.ndarray, n_bins: int = 10\n) -> dict:\n    \"\"\"較正情報をまとめて返す。reliability 曲線描画用の bin データを含む。\"\"\"\n    y_true = np.asarray(y_true, dtype=float)\n    y_prob = np.asarray(y_prob, dtype=float)\n    if y_true.size == 0:\n        return {\n            \"brier\": 0.0,\n            \"ece\": 0.0,\n            \"centers\": [],\n            \"empirical\": [],\n            \"counts\": [],\n            \"n_bins\": n_bins,\n        }\n    if y_true.shape != y_prob.shape:\n        raise ValueError(\"y_true と y_prob の形状が一致しません\")\n    idx, edges = _bin_indices(y_prob, n_bins)\n    centers, empirical, counts = [], [], []\n    for b in range(n_bins):\n        mask = idx == b\n        count = int(np.sum(mask))\n        if count == 0:\n            continue\n        centers.append(float(np.mean(y_prob[mask])))\n        empirical.append(float(np.mean(y_true[mask])))\n        counts.append(count)\n    return {\n        \"brier\": brier_score(y_true, y_prob),\n        \"ece\": expected_calibration_error(y_true, y_prob, n_bins),\n        \"centers\": centers,\n        \"empirical\": empirical,\n        \"counts\": counts,\n        \"n_bins\": n_bins,\n    }\n\n\ndef threshold_recall_swing(\n    y_true: np.ndarray, y_prob: np.ndarray, threshold: float, delta: float = 0.1\n) -> float:\n    \"\"\"しきい値 ±delta での再現率の差（感度指標）。大きい=しきい値選定が結果に強く影響。\"\"\"\n    lo = max(0.0, threshold - delta)\n    hi = min(1.0, threshold + delta)\n    rec_lo = compute_metrics(y_true, apply_threshold(y_prob, lo))[\"recall\"]\n    rec_hi = compute_metrics(y_true, apply_threshold(y_prob, hi))[\"recall\"]\n    return float(abs(rec_lo - rec_hi))\n", "src/model.py": "\"\"\"二値分類モデルの学習と予測確率の取得。\"\"\"\nfrom __future__ import annotations\n\nimport numpy as np\nfrom sklearn.linear_model import LogisticRegression\nfrom sklearn.pipeline import make_pipeline\nfrom sklearn.preprocessing import StandardScaler\n\n\ndef train_model(X_train: np.ndarray, y_train: np.ndarray, random_state: int = 42):\n    \"\"\"ロジスティック回帰を学習する。特徴量は StandardScaler で標準化する（収束と較正の安定化）。\n    クラス重みは既定（不均衡の様子を見せるため補正しない）。戻り値は sklearn Pipeline。\"\"\"\n    X_train = np.asarray(X_train, dtype=float)\n    y_train = np.asarray(y_train, dtype=int)\n    if X_train.shape[0] != y_train.shape[0]:\n        raise ValueError(\n            f\"サンプル数が不一致: X_train={X_train.shape[0]}, y_train={y_train.shape[0]}\"\n        )\n    if X_train.shape[0] == 0:\n        raise ValueError(\"学習データが空です\")\n    model = make_pipeline(\n        StandardScaler(),\n        LogisticRegression(max_iter=2000, random_state=random_state),\n    )\n    model.fit(X_train, y_train)\n    return model\n\n\ndef predict_proba_positive(model, X: np.ndarray) -> np.ndarray:\n    \"\"\"陽性クラス（ラベル 1）の確率を返す。モデルがクラス [0,1] を持つことを前提とする。\"\"\"\n    X = np.asarray(X, dtype=float)\n    if X.shape[0] == 0:\n        return np.array([], dtype=float)\n    proba = model.predict_proba(X)\n    classes = list(model.classes_)\n    if 1 not in classes:\n        # 陽性クラスが学習データに無い場合は確率 0 とする\n        return np.zeros(X.shape[0], dtype=float)\n    idx = classes.index(1)\n    return np.asarray(proba[:, idx], dtype=float)\n", "src/plots.py": "\"\"\"混同行列と較正曲線の描画。Altair を使用し、WASM 環境での日本語豆腐化を回避する。\"\"\"\nfrom __future__ import annotations\n\nimport pandas as pd\n\nimport altair as alt\n\nfrom src.brand import PALETTE\n\n\ndef plot_confusion_matrix(\n    confusion: dict[str, int], pos_label: str, neg_label: str\n) -> alt.LayerChart:\n    \"\"\"混同行列をヒートマップで描画。行=正解、列=予測。\"\"\"\n    tn, fp = confusion[\"tn\"], confusion[\"fp\"]\n    fn, tp = confusion[\"fn\"], confusion[\"tp\"]\n    total = tn + fp + fn + tp\n\n    data = pd.DataFrame([\n        {\"正解\": neg_label, \"予測\": neg_label, \"count\": tn, \"label\": str(tn)},\n        {\"正解\": neg_label, \"予測\": pos_label, \"count\": fp, \"label\": str(fp)},\n        {\"正解\": pos_label, \"予測\": neg_label, \"count\": fn, \"label\": str(fn)},\n        {\"正解\": pos_label, \"予測\": pos_label, \"count\": tp, \"label\": str(tp)},\n    ])\n\n    order = [neg_label, pos_label]\n\n    base = alt.Chart(data).encode(\n        x=alt.X(\"予測:N\", sort=order, title=\"予測\"),\n        y=alt.Y(\"正解:N\", sort=order, title=\"正解\"),\n    )\n\n    heatmap = base.mark_rect().encode(\n        color=alt.Color(\n            \"count:Q\",\n            scale=alt.Scale(scheme=\"blues\"),\n            legend=alt.Legend(title=\"件数\"),\n        )\n    )\n\n    threshold = total * 0.4 if total > 0 else 1\n    text = base.mark_text(baseline=\"middle\", fontSize=14).encode(\n        text=\"label:N\",\n        color=alt.condition(\n            alt.datum[\"count\"] > threshold,\n            alt.value(\"white\"),\n            alt.value(\"#0d1526\"),\n        ),\n    )\n\n    return (heatmap + text).properties(\n        title=\"混同行列\",\n        width=280,\n        height=240,\n    )\n\n\ndef plot_calibration(calibration: dict) -> alt.LayerChart:\n    \"\"\"信頼性曲線（reliability curve）と対角線を描画。\"\"\"\n    centers = calibration.get(\"centers\", [])\n    empirical = calibration.get(\"empirical\", [])\n    counts = calibration.get(\"counts\", [])\n\n    diag_df = pd.DataFrame({\"x\": [0.0, 1.0], \"y\": [0.0, 1.0]})\n    diag = (\n        alt.Chart(diag_df)\n        .mark_line(color=\"#5b6474\", strokeDash=[4, 4])\n        .encode(\n            x=alt.X(\"x:Q\", scale=alt.Scale(domain=[0, 1]), title=\"予測確率（bin 平均）\"),\n            y=alt.Y(\"y:Q\", scale=alt.Scale(domain=[0, 1]), title=\"実測の陽性率\"),\n        )\n    )\n\n    if not centers:\n        return diag.properties(title=\"較正（信頼性）曲線\", width=280, height=240)\n\n    obs_df = pd.DataFrame({\"center\": centers, \"empirical\": empirical, \"count\": counts})\n\n    obs_line = (\n        alt.Chart(obs_df)\n        .mark_line(color=PALETTE[0], opacity=0.5)\n        .encode(\n            x=alt.X(\"center:Q\"),\n            y=alt.Y(\"empirical:Q\"),\n        )\n    )\n\n    obs_scatter = (\n        alt.Chart(obs_df)\n        .mark_point(filled=True, color=PALETTE[0])\n        .encode(\n            x=alt.X(\"center:Q\"),\n            y=alt.Y(\"empirical:Q\"),\n            size=alt.Size(\n                \"count:Q\",\n                scale=alt.Scale(range=[40, 240]),\n                legend=None,\n            ),\n            tooltip=[\n                alt.Tooltip(\"center:Q\", format=\".2f\", title=\"予測確率\"),\n                alt.Tooltip(\"empirical:Q\", format=\".2f\", title=\"実測陽性率\"),\n                alt.Tooltip(\"count:Q\", title=\"件数\"),\n            ],\n        )\n    )\n\n    return (diag + obs_line + obs_scatter).properties(\n        title=\"較正（信頼性）曲線\",\n        width=280,\n        height=240,\n    )\n", ".streamlit/config.toml": "# Portfolio Design System v2 — 共通 Streamlit テーマ（正典: portfolio-plan/brand/config.toml）\n[theme]\nbase = \"light\"\nprimaryColor = \"#0f766e\"\nbackgroundColor = \"#f6f7f9\"\nsecondaryBackgroundColor = \"#ffffff\"\ntextColor = \"#0d1526\"\nfont = \"sans serif\"\n"}}, document.getElementById("root"));
</script>
